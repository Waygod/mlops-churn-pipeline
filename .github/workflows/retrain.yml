name: CT - Scheduled Continuous Training

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run continuous training pipeline
        run: python src/retrain.py

      - name: Run tests after retraining
        run: pytest -q

      - name: Upload model artefacts
        uses: actions/upload-artifact@v4
        with:
          name: retrained-model-and-metrics
          path: |
            app/model.pkl
            app/metrics.json
