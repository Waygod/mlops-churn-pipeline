name: CD - Docker Deployment Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deployment-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t churn-api .

      - name: Confirm Docker image exists
        run: docker images | grep churn-api